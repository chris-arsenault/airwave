services:
  api:
    image: ghcr.io/chris-arsenault/airwave/api:${IMAGE_TAG:-latest}
    container_name: airwave-api
    network_mode: host
    restart: unless-stopped
    volumes:
      - /mnt/apps/shares/public/Music:/mnt/music
      - airwave-data:/data
    environment:
      - RUST_LOG=airwave_server=info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7882/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  web:
    image: ghcr.io/chris-arsenault/airwave/web:${IMAGE_TAG:-latest}
    container_name: airwave-web
    network_mode: host
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  airwave-data:
