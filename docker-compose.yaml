services:
  wiim-server:
    build: ./wiim-server
    container_name: wiim-server
    network_mode: host
    restart: unless-stopped
    volumes:
      - /mnt/apps/shares/public/Music:/mnt/music:ro
      - ./wiim-server/config.toml:/etc/wiim-server/config.toml:ro
      - /mnt/apps/apps/wiim-dlna:/data
    environment:
      - RUST_LOG=wiim_server=info

  frontend:
    build: ./control/frontend
    container_name: wiim-control-frontend
    network_mode: host
    restart: unless-stopped
    depends_on:
      - wiim-server
